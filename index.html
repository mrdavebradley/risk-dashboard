<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Sentiment Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col items-center p-6">

    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold text-white mb-2">Macro Risk Monitor</h1>
        <p class="text-slate-400">Real-time Composite Risk Sentiment Score (CRSS)</p>
    </header>

    <main class="bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-2xl w-full max-w-2xl text-center">
        <div class="mb-6">
            <span id="sentiment-badge" class="px-4 py-1 rounded-full text-sm font-bold uppercase tracking-wider bg-slate-700 text-slate-300">
                Loading...
            </span>
        </div>

        <div class="relative flex justify-center items-center mb-6">
            <div class="absolute text-center">
                <span id="crss-value" class="text-6xl font-black text-white">--</span>
                <p class="text-slate-500 uppercase text-xs tracking-widest mt-1">Score</p>
            </div>
            <canvas id="gaugeChart" width="300" height="300"></canvas>
        </div>

        <div class="grid grid-cols-2 gap-4 border-t border-slate-700 pt-6 text-sm">
            <div class="text-left">
                <p class="text-slate-500">Thresholds:</p>
                <p class="text-green-400 font-medium">+35: Risk-On</p>
                <p class="text-red-400 font-medium">-35: Risk-Off</p>
            </div>
            <div class="text-right">
                <p class="text-slate-500">Last Updated:</p>
                <p id="last-updated" class="text-slate-300 font-mono">--</p>
            </div>
        </div>
    </main>

    <div class="mt-10 w-full max-w-2xl h-24 bg-slate-800/50 border border-dashed border-slate-700 rounded flex items-center justify-center text-slate-600 italic">
        Future Ad Space
    </div>

    <script>
        // Function to fetch data from your GitHub data.json
        async function updateDashboard() {
            try {
                // Fetch the data.json file (the cache-buster ensures you get the freshest data)
                const response = await fetch('data.json?v=' + new Date().getTime());
                const data = await response.json();

                // 1. Update Text
                document.getElementById('crss-value').innerText = data.crss;
                document.getElementById('last-updated').innerText = data.last_updated;
                
                const badge = document.getElementById('sentiment-badge');
                badge.innerText = data.status;

                // 2. Color Logic
                let color = '#94a3b8'; // Neutral (Slate)
                if (data.crss > 35) {
                    color = '#4ade80'; // Green
                    badge.classList.add('bg-green-500/20', 'text-green-400');
                } else if (data.crss < -35) {
                    color = '#f87171'; // Red
                    badge.classList.add('bg-red-500/20', 'text-red-400');
                }

                // 3. Create Gauge Chart
                const ctx = document.getElementById('gaugeChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        datasets: [{
                            data: [data.crss + 100, 200 - (data.crss + 100)],
                            backgroundColor: [color, '#1e293b'],
                            borderWidth: 0,
                            circumference: 270,
                            rotation: 225,
                            cutout: '85%'
                        }]
                    },
                    options: { 
                        responsive: false,
                        plugins: { tooltip: { enabled: false } }
                    }
                });

            } catch (error) {
                console.error("Error loading dashboard data:", error);
            }
        }

        updateDashboard();
    </script>
</body>
</html>
