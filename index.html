<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Risk Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col items-center p-6">

    <header class="text-center mb-6">
        <h1 class="text-4xl font-black text-white mb-1 tracking-tighter">Macro Risk Monitor</h1>
        <p class="text-slate-500 font-medium italic">Composite Risk Sentiment Score (CRSS)</p>
    </header>

    <main class="bg-slate-800 border border-slate-700/50 rounded-3xl p-10 shadow-2xl w-full max-w-2xl text-center relative">
        
        <div class="mb-6 flex justify-center">
            <span id="sentiment-badge" class="px-7 py-2 rounded-full text-sm font-black uppercase tracking-[0.3em] transition-all duration-500">
                LOADING...
            </span>
        </div>

        <div class="relative flex flex-col items-center justify-center pt-2">
            <div class="absolute left-0 bottom-24 text-red-700 font-black text-xs">-100</div>
            <div class="absolute right-0 bottom-24 text-emerald-700 font-black text-xs">+100</div>

            <canvas id="gaugeChart" width="480" height="260"></canvas>
            
            <div class="absolute top-[50%] flex flex-col items-center justify-center">
                <span id="crss-value" class="text-7xl font-black text-white leading-none tracking-tighter">--</span>
                <p class="text-slate-500 uppercase text-[10px] tracking-[0.4em] font-bold mt-2">Current Score</p>
            </div>
        </div>

        <div class="flex flex-wrap justify-center gap-x-10 gap-y-3 mt-10 py-5 border-y border-slate-700/30">
            <div class="flex items-center gap-2.5 text-[11px] font-extrabold text-red-400 uppercase tracking-wider">
                <div class="w-3 h-3 bg-red-500 rounded-sm"></div> < -35 RISK OFF
            </div>
            <div class="flex items-center gap-2.5 text-[11px] font-extrabold text-yellow-500 uppercase tracking-wider">
                <div class="w-3 h-3 bg-yellow-500 rounded-sm"></div> ±35 NEUTRAL
            </div>
            <div class="flex items-center gap-2.5 text-[11px] font-extrabold text-green-400 uppercase tracking-wider">
                <div class="w-3 h-3 bg-green-500 rounded-sm"></div> > +35 RISK ON
            </div>
        </div>

        <div class="flex justify-between mt-6 text-[9px] uppercase tracking-[0.3em] font-bold text-slate-600">
            <div>6H Data Sync</div>
            <div>Synced: <span id="last-updated" class="text-slate-500 font-mono">--</span></div>
        </div>
    </main>

    <script>
        const gaugeColors = ['#ef4444', '#f97316', '#eab308', '#84cc16', '#22c55e', '#10b981'];

        // --- PLUGIN: DRAW THRESHOLD MARKERS (+35 / -35) ---
        const thresholdMarkers = {
            id: 'thresholdMarkers',
            afterDatasetsDraw(chart) {
                const { ctx, chartArea: { left, right, bottom } } = chart;
                const cx = (left + right) / 2;
                const cy = bottom;
                const outerRadius = chart.getDatasetMeta(0).data[0].outerRadius;
                
                ctx.save();
                ctx.translate(cx, cy);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.font = 'bold 10px sans-serif';

                const thresholds = [-35, 35];
                thresholds.forEach(val => {
                    const angle = Math.PI + ((val + 100) / 200) * Math.PI;
                    ctx.rotate(angle);
                    
                    // Draw Line
                    ctx.beginPath();
                    ctx.moveTo(outerRadius + 2, 0);
                    ctx.lineTo(outerRadius + 12, 0);
                    ctx.strokeStyle = val > 0 ? '#4ade80' : '#f87171';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Draw Text Label
                    ctx.fillStyle = val > 0 ? '#4ade80' : '#f87171';
                    ctx.fillText(val > 0 ? '+35' : '-35', outerRadius + 25, 5);
                    
                    ctx.rotate(-angle); // Reset rotation for next label
                });
                ctx.restore();
            }
        };

        // --- PLUGIN: DRAW NEEDLE ---
        const gaugeNeedle = {
            id: 'gaugeNeedle',
            afterDatasetsDraw(chart) {
                const { ctx, chartArea: { left, right, bottom } } = chart;
                ctx.save();
                const cx = (left + right) / 2;
                const cy = bottom;
                const outerRadius = chart.getDatasetMeta(0).data[0].outerRadius;
                const needleLength = outerRadius - 10;
                const score = chart.config.data.datasets[0].needleValue;
                const angle = Math.PI + ((score + 100) / 200) * Math.PI;

                ctx.translate(cx, cy);
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.moveTo(0, -3.5); 
                ctx.lineTo(needleLength, 0);
                ctx.lineTo(0, 3.5);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(0, 0, 9, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.restore();
            }
        };

        Chart.register(thresholdMarkers, gaugeNeedle);

        async function updateDashboard() {
            try {
                const response = await fetch('data.json?v=' + new Date().getTime());
                const data = await response.json();
                const score = parseFloat(data.crss);

                document.getElementById('crss-value').innerText = data.crss;
                document.getElementById('last-updated').innerText = data.last_updated;
                const badge = document.getElementById('sentiment-badge');
                badge.innerText = data.status;

                badge.className = "px-7 py-2 rounded-full text-sm font-black uppercase tracking-[0.3em] transition-all duration-500";
                if (score > 35) {
                    badge.classList.add('bg-green-500', 'text-slate-900', 'shadow-[0_0_20px_rgba(34,197,94,0.4)]');
                } else if (score < -35) {
                    badge.classList.add('bg-red-500', 'text-white', 'shadow-[0_0_20px_rgba(239,68,68,0.4)]');
                } else {
                    badge.classList.add('bg-yellow-500', 'text-slate-900', 'shadow-[0_0_20px_rgba(234,179,8,0.3)]');
                }

                const ctx = document.getElementById('gaugeChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        datasets: [{
                            data: [1, 1, 1, 1, 1, 1],
                            backgroundColor: gaugeColors,
                            needleValue: score,
                            borderWidth: 2,
                            borderColor: '#1e293b',
                            cutout: '80%',
                            circumference: 180,
                            rotation: 270,
                        }]
                    },
                    options: {
                        aspectRatio: 1.8,
                        plugins: { tooltip: { enabled: false } },
                        layout: { padding: { top: 30, bottom: 10, left: 30, right: 30 } }
                    }
                });
            } catch (error) {
                console.error("Dashboard error:", error);
            }
        }
        updateDashboard();
    </script>
    <div class="mt-8">
    <a href="about.html" class="text-slate-500 hover:text-white underline text-xs font-bold uppercase tracking-widest transition-all">
        View Methodology & Data Sources
    </a>
</div>
</body>
</html>
