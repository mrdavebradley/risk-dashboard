name: Daily Risk Update

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch:  # Allows you to run it manually with a button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This tells GitHub this specific job is allowed to save files
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated version

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated version
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance fredapi pandas

      - name: Run Risk Engine
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python calc_risk.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data.json
          git commit -m "Automated Risk Score Update" || echo "No changes to commit"
          git push